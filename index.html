<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affitti – Lofta Milano</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; padding: 20px; }

  .toolbar {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 8px; margin-bottom: 16px;
    max-width: 760px; margin-left: auto; margin-right: auto;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border: none; border-radius: 6px;
    font-family: Arial, sans-serif; font-size: 18px; font-weight: bold;
    cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .82; }
  .btn-print { background: #16a34a; color: #fff; }
  .btn-size  { background: #e5e7eb; color: #374151; padding: 7px 13px; font-size: 16px; min-width: 34px; justify-content: center; }
  .btn-size:hover { background: #d1d5db; }
  .size-label { font-size: 12px; color: #888; font-family: Arial, sans-serif; padding: 0 2px; }

  #status { max-width: 760px; margin: 0 auto 12px; font-size: 12px; color: #555; min-height: 18px; }
  #status.error { color: #c00; }
  #status.ok    { color: #16a34a; }

  .table-wrap { max-width: 760px; margin: 0 auto; overflow-x: auto; }

  table.affitti {
    border-collapse: collapse; width: 100%;
    background: #fff; border: 2.5px solid #c00; font-size: 18px;
  }
  table.affitti td { border: 1px solid #555; padding: 3px 6px; white-space: nowrap; }

  .row-header-info td { font-weight: bold; text-align: center; padding: 4px 6px; }
  .row-col-labels td  { font-weight: bold; text-align: center; line-height: 1.25; padding: 5px 4px; }
  .cell-address { white-space: pre-line !important; text-align: center; font-style: italic; font-weight: normal; }
  .row-data td  { font-weight: bold; }
  .cell-name    { text-align: left; }
  .cell-num     { text-align: right; }
  .cell-canone  { text-align: right; }
  .row-sep td   { font-weight: normal; padding: 3px 6px; }
  .row-footer td { font-size: 10px; text-align: center; padding: 1px 4px; height: 8px; line-height: 1; color: #666; font-weight: normal; }

  #loading { display: none; max-width: 760px; margin: 30px auto; text-align: center; color: #555; font-size: 14px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #ccc; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media print {
    body { background: #fff; padding: 0; }
    .toolbar, #status, #loading { display: none !important; }
    .table-wrap { max-width: none; overflow: visible; }
    table.affitti { border: 2.5px solid #c00; }
    @page { margin: 1cm; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn btn-size" onclick="changeSize(-1)">−</button>
  <span class="size-label" id="size-label">18px</span>
  <button class="btn btn-size" onclick="changeSize(+1)">+</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ Stampa</button>
</div>

<div id="status"></div>
<div id="loading"><span class="spinner"></span>Caricamento Excel…</div>
<div class="table-wrap">
  <table class="affitti" id="tbl" style="display:none"></table>
</div>

<script>
// ═══════════════════════════════════════════════
//  ▼▼▼  MODIFICA QUI IL LINK DROPBOX  ▼▼▼
const DROPBOX_LINK = 'https://www.dropbox.com/scl/fi/q3ewoodokhsrd8g11l915/AFFITTI.xlsx?rlkey=47altne9kdaw9y5h8bm57lun5&st=qjbkqviq&dl=0';
//  ▲▲▲  MODIFICA QUI IL LINK DROPBOX  ▲▲▲
// ═══════════════════════════════════════════════

let fontSize = 18;
function changeSize(delta) {
  fontSize = Math.min(22, Math.max(9, fontSize + delta));
  document.getElementById('tbl').style.fontSize = fontSize + 'px';
  document.getElementById('size-label').textContent = fontSize + 'px';
}

function toDirectLink(url) {
  let u = url.trim();
  if (u.includes('dropbox.com')) {
    u = u.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
    if (u.includes('dl=0'))       u = u.replace('dl=0', 'dl=1');
    else if (!u.includes('dl=1')) u += (u.includes('?') ? '&' : '?') + 'dl=1';
  }
  return u;
}

function isXlsx(ab) {
  const b = new Uint8Array(ab, 0, 4);
  return b[0] === 0x50 && b[1] === 0x4B;
}

async function loadFromUrl(rawUrl) {
  document.getElementById('status').textContent = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tbl').style.display = 'none';
  try {
    const resp = await fetch(toDirectLink(rawUrl));
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' — link non pubblico?');
    const ab = await resp.arrayBuffer();
    if (!isXlsx(ab)) throw new Error('Risposta non valida — verifica il link.');
    const wb = XLSX.read(ab, { type: 'array', cellDates: true, cellStyles: true });
    if (!wb.Sheets['AFFITTI']) throw new Error('Foglio "AFFITTI" non trovato.');
    renderSheet(wb, 'AFFITTI');
    setStatus('✅ Aggiornato.', 'ok');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    setStatus('❌ ' + e.message, 'error');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}

// ── Legge area di stampa da wb.Workbook.Names ──
function getPrintArea(wb, sheetName) {
  try {
    const names = wb.Workbook && wb.Workbook.Names || [];
    for (const n of names) {
      if (n.Name === '_xlnm.Print_Area') {
        // Ref tipo: "'AFFITTI'!$A$1:$G$32" oppure "AFFITTI!$A$1:$G$32"
        const ref = n.Ref.replace(/'/g, '');
        const m = ref.match(/!\$([A-Z]+)\$(\d+):\$([A-Z]+)\$(\d+)/);
        if (m) {
          const colIdx = s => s.split('').reduce((a, c) => a * 26 + c.charCodeAt(0) - 64, 0) - 1;
          return { minRow: +m[2], maxRow: +m[4], minCol: colIdx(m[1]), maxCol: colIdx(m[3]) };
        }
      }
    }
  } catch(e) {}
  return null;
}

function renderSheet(wb, sheetName) {
  const ws = wb.Sheets[sheetName];

  // 1. Area di stampa (da file) con fallback all'intervallo dati
  const pa = getPrintArea(wb, sheetName);
  let minRow, maxRow, minCol, maxCol;
  if (pa) {
    minRow = pa.minRow; maxRow = pa.maxRow;
    minCol = pa.minCol; maxCol = pa.maxCol;
  } else {
    const range = XLSX.utils.decode_range(ws['!ref']);
    minRow = range.s.r + 1; maxRow = range.e.r + 1;
    minCol = range.s.c;     maxCol = range.e.c;
  }

  // 2. Colonne nascoste — lette direttamente da ws['!cols'] (SheetJS con cellStyles:true)
  const colsMeta = ws['!cols'] || [];
  const hiddenCols = new Set();
  for (let c = minCol; c <= maxCol; c++) {
    if (colsMeta[c] && colsMeta[c].hidden === true) hiddenCols.add(c);
  }

  // 3. Righe nascoste — lette direttamente da ws['!rows'] (SheetJS con cellStyles:true)
  const rowsMeta = ws['!rows'] || [];
  const hiddenRows = new Set();
  for (let r = minRow; r <= maxRow; r++) {
    const m = rowsMeta[r - 1];
    if (m && m.hidden === true) hiddenRows.add(r);
  }

  // 4. Colonne visibili
  const visCols = [];
  for (let c = minCol; c <= maxCol; c++) {
    if (!hiddenCols.has(c)) visCols.push(c);
  }
  const numVisCols = visCols.length;
  const lastVisCol = visCols[visCols.length - 1];

  // 5. Celle unite: mappa top-left → {cs, rs}, skip set
  const mergeMap  = {};
  const skipSet   = new Set();
  for (const m of (ws['!merges'] || [])) {
    // colspan: colonne visibili nell'intervallo
    let cs = 0;
    for (let c = m.s.c; c <= m.e.c; c++) if (!hiddenCols.has(c) && c >= minCol && c <= maxCol) cs++;
    // rowspan: righe visibili nell'intervallo
    let rs = 0;
    for (let r = m.s.r; r <= m.e.r; r++) if (!hiddenRows.has(r + 1)) rs++;
    if (cs > 0 && rs > 0) mergeMap[m.s.r + ',' + m.s.c] = { cs, rs };
    for (let r = m.s.r; r <= m.e.r; r++)
      for (let c = m.s.c; c <= m.e.c; c++)
        if (!(r === m.s.r && c === m.s.c)) skipSet.add(r + ',' + c);
  }

  // ── Build table ──
  const tbl = document.getElementById('tbl');
  tbl.innerHTML = '';
  tbl.style.fontSize = fontSize + 'px';

  const cg = document.createElement('colgroup');
  visCols.forEach((_, i) => {
    const col = document.createElement('col');
    if (i === 0) col.style.width = '42%';
    cg.appendChild(col);
  });
  tbl.appendChild(cg);

  for (let excelRow = minRow; excelRow <= maxRow; excelRow++) {
    if (hiddenRows.has(excelRow)) continue;
    const ri = excelRow - 1;

    const tr = document.createElement('tr');

    // Determina classe riga in base al contenuto (non alla posizione)
    const hasNums = visCols.slice(1).some(cc => {
      const cell = ws[XLSX.utils.encode_cell({ r: ri, c: cc })];
      return cell && typeof cell.v === 'number';
    });
    const cellA = ws[XLSX.utils.encode_cell({ r: ri, c: visCols[0] })];
    const cellAVal = cellA ? cellA.v : null;

    if (excelRow === minRow) {
      tr.className = 'row-header-info';           // prima riga: intestazione
    } else if (excelRow === minRow + 1) {
      tr.className = 'row-col-labels';             // seconda riga: etichette colonne
    } else if (hasNums) {
      tr.className = 'row-data';                   // ha numeri → riga dati
    } else if (cellAVal && typeof cellAVal === 'string' && cellAVal.trim() !== '') {
      tr.className = 'row-sep';                    // solo testo → separatore (VIA MALAGA ecc.)
    } else {
      tr.className = 'row-footer';                 // riga vuota/CASCATA → footer
    }

    for (const ci of visCols) {
      if (skipSet.has(ri + ',' + ci)) continue;
      const cell = ws[XLSX.utils.encode_cell({ r: ri, c: ci })];
      const td = document.createElement('td');

      const mk = mergeMap[ri + ',' + ci];
      if (mk) {
        if (mk.cs > 1) td.colSpan = mk.cs;
        if (mk.rs > 1) td.rowSpan = mk.rs;
      }

      // Formatta valore
      let val = '';
      if (cell) {
        const v = cell.v;
        if (cell.t === 'd' || v instanceof Date) {
          const d = v instanceof Date ? v : new Date(v);
          val = d.getDate() + '/' + (d.getMonth()+1) + '/' + String(d.getFullYear()).slice(-2) +
                ' ' + String(d.getHours()).padStart(2,'0') + '.' + String(d.getMinutes()).padStart(2,'0');
        } else if (typeof v === 'number' && ci === lastVisCol && tr.className === 'row-data') {
          val = '€ ' + v.toLocaleString('it-IT');
        } else if (typeof v === 'number') {
          val = String(v);
        } else {
          val = v == null ? '' : String(v).trim();
        }
      }

      // Classi CSS celle
      if (tr.className === 'row-data') {
        if      (ci === visCols[0])  td.className = 'cell-name';
        else if (ci !== lastVisCol)  td.className = 'cell-num';
        else                          td.className = 'cell-canone';
      }

      if (excelRow === minRow + 1 && ci === visCols[0]) {
        td.className = 'cell-address';
        td.innerHTML = val.replace(/\n/g, '<br>');
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }

  document.getElementById('loading').style.display = 'none';
  tbl.style.display = 'table';
}

window.addEventListener('DOMContentLoaded', () => loadFromUrl(DROPBOX_LINK));
setInterval(() => {
  if (document.getElementById('tbl').style.display !== 'none') loadFromUrl(DROPBOX_LINK);
}, 5 * 60 * 1000);
</script>
</body>
</html>
