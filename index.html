<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affitti – Lofta Milano</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .82; }
  .btn-print { background: #16a34a; color: #fff; }
  .btn-size  {
    background: #e5e7eb;
    color: #374151;
    padding: 7px 13px;
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
    min-width: 34px;
    justify-content: center;
  }
  .btn-size:hover { background: #d1d5db; }
  .size-label {
    font-size: 12px;
    color: #888;
    font-family: Arial, sans-serif;
    padding: 0 2px;
  }

  /* ── Status bar ── */
  #status {
    max-width: 760px;
    margin: 0 auto 12px;
    font-size: 12px;
    color: #555;
    min-height: 18px;
  }
  #status.error { color: #c00; }
  #status.ok    { color: #16a34a; }

  /* ── Table wrapper ── */
  .table-wrap {
    max-width: 760px;
    margin: 0 auto;
    overflow-x: auto;
  }

  /* ── Main table ── */
  table.affitti {
    border-collapse: collapse;
    width: 100%;
    background: #fff;
    border: 2.5px solid #c00;
    font-size: 13px;
  }
  table.affitti td {
    border: 1px solid #555;
    padding: 3px 6px;
    white-space: nowrap;
  }

  /* Row 1 – header info */
  .row-header-info td {
    font-weight: bold;
    text-align: center;
    background: #fff;
    padding: 4px 6px;
  }

  /* Row 2 – column labels */
  .row-col-labels td {
    font-weight: bold;
    text-align: center;
    line-height: 1.25;
    background: #fff;
    padding: 5px 4px;
  }
  .cell-address {
    white-space: pre-line;
    text-align: center;
    font-style: italic;
    font-weight: normal;
  }

  /* Data rows */
  .row-data td { font-weight: bold; }
  .cell-name   { text-align: left; }
  .cell-num    { text-align: right; }
  .cell-canone { text-align: right; }

  /* Separator (VIA MALAGA) */
  .row-sep td {
    font-weight: normal;
    padding: 3px 6px;
    background: #fff;
  }

  /* Footer (CASCATA) */
  .row-footer td {
    font-size: 10px;
    text-align: center;
    padding: 1px 4px;
    height: 8px;
    line-height: 1;
    color: #666;
    font-weight: normal;
  }

  /* ── Loading spinner ── */
  #loading {
    display: none;
    max-width: 760px;
    margin: 30px auto;
    text-align: center;
    color: #555;
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 22px; height: 22px;
    border: 3px solid #ccc;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Print styles ── */
  @media print {
    body { background: #fff; padding: 0; }
    .toolbar, #status, #loading { display: none !important; }
    .table-wrap { max-width: none; overflow: visible; }
    table.affitti { border: 2.5px solid #c00; }
    @page { margin: 1cm; }
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn btn-size" onclick="changeSize(-1)" title="Riduci carattere">−</button>
  <span class="size-label" id="size-label">13px</span>
  <button class="btn btn-size" onclick="changeSize(+1)" title="Aumenta carattere">+</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ Stampa</button>
</div>

<!-- Status -->
<div id="status"></div>

<!-- Loading -->
<div id="loading"><span class="spinner"></span>Caricamento Excel…</div>

<!-- Table container -->
<div class="table-wrap">
  <table class="affitti" id="tbl" style="display:none"></table>
</div>

<script>
// ═══════════════════════════════════════════════
//  ▼▼▼  MODIFICA QUI IL LINK DROPBOX  ▼▼▼
const DROPBOX_LINK = 'https://www.dropbox.com/scl/fi/q3ewoodokhsrd8g11l915/AFFITTI.xlsx?rlkey=47altne9kdaw9y5h8bm57lun5&st=qjbkqviq&dl=0';
//  ▲▲▲  MODIFICA QUI IL LINK DROPBOX  ▲▲▲
// ═══════════════════════════════════════════════

const HIDDEN_ROWS  = new Set([6, 10, 21, 28, 29]);
const VISIBLE_COLS = [0,1,2,3,4,5]; // A–F (G è nascosta)

// ── Dimensione carattere ──
let fontSize = 13;
const MIN_SIZE = 9, MAX_SIZE = 22;

function changeSize(delta) {
  fontSize = Math.min(MAX_SIZE, Math.max(MIN_SIZE, fontSize + delta));
  document.getElementById('tbl').style.fontSize = fontSize + 'px';
  document.getElementById('size-label').textContent = fontSize + 'px';
}

// ── Converti link Dropbox → CDN diretto ──
function toDirectLink(url) {
  let u = url.trim();
  if (u.includes('dropbox.com')) {
    u = u.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
    if (u.includes('dl=0'))       u = u.replace('dl=0', 'dl=1');
    else if (!u.includes('dl=1')) u += (u.includes('?') ? '&' : '?') + 'dl=1';
  }
  return u;
}

function isXlsx(ab) {
  const b = new Uint8Array(ab, 0, 4);
  return b[0] === 0x50 && b[1] === 0x4B;
}

// ── Carica da URL ──
async function loadFromUrl(rawUrl) {
  document.getElementById('status').textContent = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tbl').style.display = 'none';
  const url = toDirectLink(rawUrl);
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' — controlla che il link sia pubblico');
    const ab = await resp.arrayBuffer();
    if (!isXlsx(ab)) throw new Error('Risposta non valida — verifica il link Dropbox.');
    const wb = XLSX.read(ab, { type: 'array', cellDates: true });
    if (!wb.Sheets['AFFITTI']) throw new Error('Foglio "AFFITTI" non trovato.');
    renderSheet(wb.Sheets['AFFITTI']);
    setStatus('✅ Aggiornato.', 'ok');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    setStatus('❌ ' + e.message, 'error');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}

// ── Render ──
function renderSheet(ws) {
  const numVisCols = VISIBLE_COLS.length;
  const tbl = document.getElementById('tbl');
  tbl.innerHTML = '';
  tbl.style.fontSize = fontSize + 'px';

  const colgroup = document.createElement('colgroup');
  ['42%','8%','9%','9%','7%','17%'].forEach(w => {
    const col = document.createElement('col');
    col.style.width = w;
    colgroup.appendChild(col);
  });
  tbl.appendChild(colgroup);

  for (let excelRow = 1; excelRow <= 32; excelRow++) {
    if (HIDDEN_ROWS.has(excelRow)) continue;
    const tr = document.createElement('tr');
    if      (excelRow === 1)  tr.className = 'row-header-info';
    else if (excelRow === 2)  tr.className = 'row-col-labels';
    else if (excelRow === 25) tr.className = 'row-sep';
    else if (excelRow === 32) tr.className = 'row-footer';
    else                       tr.className = 'row-data';

    const mergeSkip = new Set();
    VISIBLE_COLS.forEach(ci => {
      if (mergeSkip.has(ci)) return;
      const cell = ws[XLSX.utils.encode_cell({ r: excelRow-1, c: ci })];
      const td = document.createElement('td');
      let val = '';

      if (excelRow === 25 && ci === 0) {
        td.colSpan = numVisCols;
        VISIBLE_COLS.slice(1).forEach(x => mergeSkip.add(x));
      }

      if (cell) {
        const v = cell.v;
        if (cell.t === 'd' || v instanceof Date) {
          const d = v instanceof Date ? v : new Date(v);
          val = d.getDate()+'/'+(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(-2)+
                ' '+String(d.getHours()).padStart(2,'0')+'.'+String(d.getMinutes()).padStart(2,'0');
        } else if (typeof v === 'number' && ci === 5 && excelRow >= 3 && excelRow !== 25 && excelRow !== 32) {
          val = '€ ' + v.toLocaleString('it-IT');
        } else if (typeof v === 'number') {
          val = String(v);
        } else {
          val = v == null ? '' : String(v).trim();
        }
      }

      if (excelRow >= 3 && excelRow !== 25 && excelRow !== 32) {
        if      (ci === 0) td.className = 'cell-name';
        else if (ci <= 4)  td.className = 'cell-num';
        else if (ci === 5) td.className = 'cell-canone';
      }

      if (excelRow === 2 && ci === 0) {
        td.className = 'cell-address';
        td.innerHTML = val.replace(/\n/g, '<br>');
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  }

  document.getElementById('loading').style.display = 'none';
  tbl.style.display = 'table';
}

// ── Avvio + auto-refresh ogni 5 min ──
window.addEventListener('DOMContentLoaded', () => loadFromUrl(DROPBOX_LINK));
setInterval(() => {
  if (document.getElementById('tbl').style.display !== 'none') loadFromUrl(DROPBOX_LINK);
}, 5 * 60 * 1000);
</script>
</body>
</html>
